<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password • VENDOR BRIDGE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-side">
      <div class="brand">VENDOR <span>BRIDGE</span></div>
      <h2>Set a new password.</h2>
      <p>Choose a strong password you haven't used before. Minimum 6 characters.</p>
    </div>

    <div class="auth-form-side">
      <div class="auth-card">
        <div class="logo-sm">VENDOR BRIDGE</div>
        <h3>Reset password</h3>
        <p class="sub">Enter and confirm your new password.</p>

        <form id="resetForm" novalidate>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter password" required />
          </div>
          <button type="submit" class="btn btn-primary w-100" id="resetBtn">Update Password</button>
        </form>

        <p class="text-center mt-4 muted"><a href="index.html" class="link-primary"><i class="bi bi-arrow-left"></i> Back to login</a></p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>

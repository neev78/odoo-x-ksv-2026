<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Vendor Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #312e81 0%, #4f46e5 100%);
            padding: 1rem;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
        }
        .brand-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-logo {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,.15);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: .75rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,.2);
        }
        .brand-logo i {
            font-size: 28px;
            color: #fff;
        }
        .brand-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1.5px;
            margin-bottom: .25rem;
        }
        .brand-subtitle {
            font-size: .875rem;
            color: rgba(255,255,255,.7);
            font-weight: 400;
        }
        .auth-card {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.25);
            padding: 2.5rem 2rem;
        }
        .auth-card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: .25rem;
        }
        .auth-card .lead-text {
            font-size: .85rem;
            color: #64748b;
            margin-bottom: 1.75rem;
        }
        .form-label {
            font-size: .8rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: .35rem;
        }
        .input-group {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 4;
            font-size: .95rem;
            pointer-events: none;
        }
        .form-control {
            border-radius: .5rem;
            padding: .625rem .75rem .625rem 2.5rem;
            border: 1.5px solid #e2e8f0;
            font-size: .875rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,.15);
        }
        .form-control.is-invalid {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220,38,38,.1);
        }
        .invalid-feedback {
            font-size: .75rem;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            z-index: 4;
            padding: 0;
            font-size: .95rem;
        }
        .password-toggle:hover { color: #4f46e5; }
        .form-check-input:checked {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .form-check-label {
            font-size: .8rem;
            color: #64748b;
        }
        .btn-primary-vb {
            background: #4f46e5;
            border: none;
            border-radius: .5rem;
            padding: .7rem;
            font-size: .9rem;
            font-weight: 600;
            width: 100%;
            color: #fff;
            transition: background .2s, transform .1s;
        }
        .btn-primary-vb:hover { background: #3730a3; }
        .btn-primary-vb:active { transform: scale(.98); }
        .btn-primary-vb:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .8rem;
            color: rgba(255,255,255,.7);
        }
        .auth-footer a {
            color: #fff;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
        }
        .spinner-border-sm { width: 1rem; height: 1rem; border-width: .15em; }
        .divider { display: flex; align-items: center; margin: 1.25rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid #e2e8f0; }
        .divider span { padding: 0 .75rem; font-size: .75rem; color: #94a3b8; white-space: nowrap; }
        @media (max-width: 480px) {
            .auth-card { padding: 2rem 1.25rem; }
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <!-- Brand -->
    <div class="brand-section">
        <div class="brand-logo">
            <i class="bi bi-box-seam-fill"></i>
        </div>
        <div class="brand-title">VENDOR BRIDGE</div>
        <div class="brand-subtitle">Procurement Management System</div>
    </div>

    <!-- Card -->
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="lead-text">Sign in to your account to continue</p>

        <form id="loginForm" novalidate>
            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="you@company.com" required>
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required minlength="6">
                    <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                    <div class="invalid-feedback">Password is required.</div>
                </div>
            </div>

            <!-- Remember / Forgot -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="/forgot-password.html" style="font-size:.8rem;color:#4f46e5;text-decoration:none;font-weight:500;">Forgot password?</a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary-vb" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="btn-loader d-none">
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Signing in…
                </span>
            </button>
        </form>

        <div class="divider"><span>or</span></div>

        <p class="text-center mb-0" style="font-size:.85rem;color:#64748b;">
            Don't have an account? <a href="/register.html" style="color:#4f46e5;font-weight:600;text-decoration:none;">Create Account</a>
        </p>
    </div>

    <!-- Footer -->
    <div class="auth-footer mt-4">
        &copy; 2026 Vendor Bridge. All rights reserved.
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container">
    <div id="errorToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                <span id="toastText">Something went wrong.</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    'use strict';

    // If already logged in, redirect
    const existingToken = localStorage.getItem('vb_token');
    if (existingToken) {
        window.location.href = '/dashboard';
        return;
    }

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = loginBtn.querySelector('.btn-text');
    const btnLoader = loginBtn.querySelector('.btn-loader');
    const toastEl = document.getElementById('errorToast');
    const toastText = document.getElementById('toastText');
    const toast = new bootstrap.Toast(toastEl, { delay: 5000 });

    // Toggle password visibility
    const toggleBtn = document.querySelector('.password-toggle');
    toggleBtn.addEventListener('click', function () {
        const input = document.getElementById('password');
        const icon = this.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        }
    });

    // Email validation helper
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // Show error toast
    function showError(message) {
        toastText.textContent = message;
        toast.show();
    }

    // Set loading state
    function setLoading(loading) {
        loginBtn.disabled = loading;
        btnText.classList.toggle('d-none', loading);
        btnLoader.classList.toggle('d-none', !loading);
    }

    // Clear validation
    function clearValidation(input) {
        input.classList.remove('is-invalid');
    }

    emailInput.addEventListener('input', () => clearValidation(emailInput));
    passwordInput.addEventListener('input', () => clearValidation(passwordInput));

    // Form submit
    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        // Reset
        emailInput.classList.remove('is-invalid');
        passwordInput.classList.remove('is-invalid');

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Validate
        let valid = true;

        if (!email || !isValidEmail(email)) {
            emailInput.classList.add('is-invalid');
            valid = false;
        }

        if (!password) {
            passwordInput.classList.add('is-invalid');
            valid = false;
        }

        if (!valid) return;

        // API call
        setLoading(true);

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                localStorage.setItem('vb_token', data.token);
                localStorage.setItem('vb_user', JSON.stringify(data.user));
                window.location.href = '/dashboard';
            } else {
                showError(data.message || 'Invalid email or password. Please try again.');
                setLoading(false);
            }
        } catch (err) {
            showError('Unable to connect to the server. Please try again later.');
            setLoading(false);
        }
    });
})();
</script>
</body>
</html>
